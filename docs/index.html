<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ADA Conversion Comparison Tool</title>
  <link rel="icon" href="https://it.nc.gov/favicon.ico" type="image/x-icon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Source+Sans+Pro:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <!-- Top Bar -->
  <header id="topbar">
    <div class="topbar-brand">
      <img src="ncdit-white-logo.png" alt="NC DIT Logo" class="topbar-logo">
      <h1>ADA Conversion Comparison</h1>
    </div>
    <div class="topbar-doc-nav">
      <button class="doc-nav-btn" id="prevDocBtn" title="Previous document" aria-label="Previous document"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
      <span class="topbar-doc-name" id="topbarDocName"></span>
      <button class="doc-nav-btn" id="nextDocBtn" title="Next document" aria-label="Next document"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button>
    </div>
    <div class="topbar-actions">
      <label for="batchSelect" class="batch-label">Batch:</label>
      <select id="batchSelect" aria-label="Select document batch"></select>
    </div>
  </header>

  <!-- Welcome / Loading Screen -->
  <div id="welcome">
    <img src="ncdit-white-logo.png" alt="NC DIT Logo" class="welcome-logo">
    <div class="welcome-title">ADA Conversion Comparison Tool</div>
    <div class="welcome-sub">Loading documents from GitHub...</div>
    <div class="spinner" style="margin-top:12px"></div>
  </div>

  <!-- Workspace (hidden until folder opened) -->
  <div id="workspace">
    <!-- Sidebar -->
    <aside id="sidebar" aria-label="Document folders">
      <div class="sidebar-collapsed-label" id="sidebarCollapsedLabel">Documents</div>
      <div class="sidebar-header">
        <div class="sidebar-top-row">
          <span class="sidebar-label">Documents</span>
          <span class="sidebar-count" id="sidebarCount">0</span>
          <button class="collapse-toggle" id="sidebarCollapseBtn" aria-expanded="true" title="Collapse"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
        </div>
        <input type="search" id="sidebarSearch" placeholder="Filter folders..." aria-label="Filter folders">
      </div>
      <div id="sidebarList" role="listbox" aria-label="Document list"></div>
    </aside>

    <div class="rh-v" id="sidebarHandle"></div>

    <!-- Content -->
    <main id="content">
      <div class="conv-cols">
        <!-- Old HTML + Old Audit Column -->
        <div class="conv-col" id="oldHtmlCol">
          <div class="conv-col-hdr"><button class="collapse-toggle" id="oldColCollapseBtn" aria-expanded="true" title="Collapse"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button><span class="col-badge old">OLD</span><span class="col-label">old-converted.html</span><button class="html-toggle" id="oldHtmlToggle" title="Toggle raw HTML">Show HTML &lt;/&gt;</button></div>
          <div class="conv-col-body" id="oldHtmlBody"><div class="no-file">Select a document</div></div>
          <div class="rh-h" id="oldAuditHandle"></div>
          <div class="audit-panel-wrap" id="oldAuditWrap">
            <div class="provider-tabs hidden" id="oldProviderTabs" role="tablist" aria-label="Old audit provider"></div>
            <div class="audit-panel" id="oldAuditPanel"></div>
          </div>
        </div>
        <div class="rh-v col-handle" id="oldColHandle" data-left="oldHtmlCol" data-right="newHtmlCol"></div>
        <!-- New HTML + New Audit Column -->
        <div class="conv-col" id="newHtmlCol">
          <div class="conv-col-hdr">
            <button class="collapse-toggle" id="newColCollapseBtn" aria-expanded="true" title="Collapse"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg></button>
            <span class="col-badge new">NEW</span><span class="col-label">converted.html</span>
            <button class="html-toggle" id="newHtmlToggle" title="Toggle raw HTML">Show HTML &lt;/&gt;</button>
          </div>
          <div class="conv-col-body" id="newHtmlBody"><div class="no-file">Select a document</div></div>
          <div class="rh-h" id="newAuditHandle"></div>
          <div class="audit-panel-wrap" id="newAuditWrap">
            <div class="provider-tabs hidden" id="newProviderTabs" role="tablist" aria-label="New audit provider"></div>
            <div class="audit-panel" id="newAuditPanel"></div>
          </div>
        </div>
        <div class="rh-v col-handle" id="newColHandle" data-left="newHtmlCol" data-right="pdfCol"></div>
        <!-- PDF Column -->
        <div class="conv-col" id="pdfCol">
          <div class="conv-col-hdr"><span class="col-badge pdf">PDF</span><span class="col-label">source.pdf</span><button class="collapse-toggle" id="pdfColCollapseBtn" aria-expanded="true" title="Collapse"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18l6-6-6-6"/></svg></button></div>
          <div class="conv-col-body pdf-body" id="pdfBody"><div class="no-file">Select a document</div></div>
        </div>
      </div>

      <!-- Loading overlay -->
      <div class="loading-overlay" id="contentLoading">
        <div class="spinner"></div>
        <p>Loading files...</p>
      </div>
    </main>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
